name: Scrape Pharma Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      - name: Run Scraper
        env:
          COLLABO_ID: ${{ secrets.COLLABO_ID }}
          COLLABO_PW: ${{ secrets.COLLABO_PW }}
          MEDIPAL_ID: ${{ secrets.MEDIPAL_ID }}
          MEDIPAL_PW: ${{ secrets.MEDIPAL_PW }}
          ALFWEB_ID: ${{ secrets.ALFWEB_ID }}
          ALFWEB_PW: ${{ secrets.ALFWEB_PW }}
        run: python fetch_data.py
      - name: Generate Dashboard HTML
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python generate_dashboard.py
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: scrape-and-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
